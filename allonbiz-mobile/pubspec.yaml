name: allonbiz_mobile
description: "allonbiz premium navigation and proximity discovery app."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI / Assets
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  flutter_spinkit: ^5.2.1
  lottie: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  qr_flutter: ^4.1.0
  smooth_page_indicator: ^1.2.0+3

  # Core architecture
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  equatable: ^2.0.7
  logger: ^2.5.0
  fpdart: ^1.1.1 # Clean error handling



  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Networking & Utils
  http: ^1.6.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.0
  flutter_background_service: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - assets/icons/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
