name: allonbiz_mobile
description: "allonbiz premium navigation and proximity discovery app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_animate: ^4.5.0
  flutter_background_service: ^5.0.10
  flutter_dotenv: ^5.2.1
  flutter_local_notifications: ^18.0.1
  flutter_map: ^6.2.1
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.2
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/env/.env
